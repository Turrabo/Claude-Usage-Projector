name: build-host

# Build the Rust host binary on every push to a non-main branch, and on
# manual dispatch. Used for dev iteration on a machine without local MSVC
# tooling — pull the artifact down and run it locally to test.

on:
  push:
    branches-ignore:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Show toolchain
        run: |
          rustc --version
          cargo --version

      - name: cargo fmt --check
        run: cargo fmt --all -- --check
        continue-on-error: true

      - name: cargo clippy
        run: cargo clippy --release --all-targets -- -D warnings
        continue-on-error: true

      - name: cargo build --release
        run: cargo build --release

      - name: Upload host artifact
        uses: actions/upload-artifact@v4
        with:
          name: ccum-host-${{ github.sha }}
          path: target/release/*.exe
          retention-days: 14
